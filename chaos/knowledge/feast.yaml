operator:
  name: opendatahub-feast-operator
  namespace: redhat-ods-applications
  repository: https://github.com/opendatahub-io/feast-module-operator

components:
  - name: opendatahub-feast-operator
    controller: FeastOperatorReconciler
    managedResources:
      - apiVersion: apps/v1
        kind: Deployment
        name: opendatahub-feast-operator
        namespace: redhat-ods-applications
        labels:
          app.kubernetes.io/name: opendatahub-feast-operator
        expectedSpec:
          replicas: 1
      - apiVersion: v1
        kind: ServiceAccount
        name: opendatahub-feast-operator
        namespace: redhat-ods-applications
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        name: opendatahub-feast-manager-role
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: opendatahub-feast-manager-rolebinding
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        name: opendatahub-feast-metrics-auth-role
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: opendatahub-feast-metrics-auth-rolebinding
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        name: opendatahub-feast-metrics-reader
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        name: opendatahub-feast-components-feastoperator-admin-role
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        name: opendatahub-feast-components-feastoperator-editor-role
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        name: opendatahub-feast-components-feastoperator-viewer-role
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: Role
        name: opendatahub-feast-leader-election-role
        namespace: redhat-ods-applications
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        name: opendatahub-feast-leader-election-rolebinding
        namespace: redhat-ods-applications
      - apiVersion: v1
        kind: Service
        name: opendatahub-feast-metrics-service
        namespace: redhat-ods-applications
      - apiVersion: coordination.k8s.io/v1
        kind: Lease
        name: opendatahub-feast-operator-lock
        namespace: redhat-ods-applications
    steadyState:
      checks:
        - type: conditionTrue
          apiVersion: apps/v1
          kind: Deployment
          name: opendatahub-feast-operator
          namespace: redhat-ods-applications
          conditionType: Available
      timeout: "60s"

recovery:
  reconcileTimeout: "300s"
  maxReconcileCycles: 10
