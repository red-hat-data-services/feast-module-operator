name: Release

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: '1.26'
  IMAGE_REGISTRY: quay.io
  IMAGE_REPO: opendatahub/feast-module-operator

jobs:
  release-image:
    name: Build and Push Release Image
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          make container-build \
            CONTAINER_TOOL=docker \
            IMG=${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:${{ steps.version.outputs.version }}

      - name: Tag additional tags
        run: |
          docker tag \
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:${{ steps.version.outputs.version }} \
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:${{ steps.version.outputs.sha_tag }}
          docker tag \
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:${{ steps.version.outputs.version }} \
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:latest

      - name: Push images
        run: |
          docker push ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:${{ steps.version.outputs.version }}
          docker push ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:${{ steps.version.outputs.sha_tag }}
          docker push ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:latest
